#backbtn{background:#0f3460;border:none;color:#eee;font-size:14px;font-weight:600;padding:8px 14px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:6px;}

#map-sub{font-size:12px;color:#888;}
#map{flex:1;}

function cid(n){ return 'p' + n.replace(/[^a-zA-Z0-9]/g,'_'); }

function render(arr){
  document.getElementById('rcount').textContent = arr.length === PADS.length ? 'All ' + PADS.length + ' pads' : arr.length + ' results';
  var html = '';
  for(var i=0;i<arr.length;i++){
    var p = arr[i];
    html += '<div class="pi" id="' + cid(p.name) + '" data-name="' + p.name.replace(/"/g,'&quot;') + '">' +

      '<div style="flex:1"><div class="pn">' + p.name + '</div><div class="pl">' + (p.location || p.folder || '') + '</div></div>' +

  }
  document.getElementById('list').innerHTML = html;
}

document.getElementById('list').addEventListener('click', function(e){
  var el = e.target.closest('.pi');
  if(!el) return;
  var name = el.getAttribute('data-name');
  var pad = PADS.find(function(p){ return p.name === name; });
  if(pad) openMap(pad);
});

  sel = pad;
  document.getElementById('map-title').textContent = 'Pad ' + pad.name;
  document.getElementById('map-sub').textContent = pad.location || pad.folder || '';
  document.getElementById('mapview').classList.add('show');
  document.getElementById('no-route').style.display = 'none';

  setTimeout(function(){
    if(!map){
      map = L.map('map').setView([pad.lat, pad.lon], 14);

        attribution: 'Esri satellite',
        maxZoom: 19
      }).addTo(map);
    } else {
      map.eachLayer(function(layer){
        if(!(layer instanceof L.TileLayer)) map.removeLayer(layer);
      });
      map.setView([pad.lat, pad.lon], 14);
    }

    // Draw approved routes for this pad
    var routes = PAD_ROUTES[pad.name];
    var hasRoute = false;

    if(routes && routes.length > 0){
      hasRoute = true;
      for(var i=0;i<routes.length;i++){
        L.polyline(routes[i], {color:'#00ff88', weight:4, opacity:0.9}).addTo(map);
      }
    }

    // Also draw base road for this folder
    var baseKey = FOLDER_MAP[pad.folder];
    if(baseKey && BASE_ROADS[baseKey]){
      L.polyline(BASE_ROADS[baseKey], {color:'#ffcc00', weight:3, opacity:0.7, dashArray:'6,4'}).addTo(map);
      hasRoute = true;
    }

    // Pad marker
    L.circleMarker([pad.lat, pad.lon], {
      radius:10, fillColor:'#e94560', color:'#fff', weight:2, fillOpacity:1
    }).addTo(map).bindPopup('<b>Pad ' + pad.name + '</b>').openPopup();

    if(!hasRoute){
      document.getElementById('no-route').style.display = 'block';
    }

    map.invalidateSize();
  }, 100);
}

function closeMap(){
  document.getElementById('mapview').classList.remove('show');
}

document.getElementById('search').addEventListener('input', function(){
  var q = this.value.trim().toLowerCase();
  render(q ? PADS.filter(function(p){
    return p.name.toLowerCase().indexOf(q)>=0 || p.location.toLowerCase().indexOf(q)>=0 || p.folder.toLowerCase().indexOf(q)>=0;
  }) : PADS);
});

render(PADS);
</script>
</body>
</html>
