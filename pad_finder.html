<style>

  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a2e; color: #eee; height: 100vh; display: flex; flex-direction: column; }
  #header { background: #16213e; padding: 12px 16px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.4); z-index: 1000; flex-shrink: 0; }
  #header h1 { font-size: 16px; font-weight: 700; color: #e94560; white-space: nowrap; }
  #search-wrap { flex: 1; position: relative; }
  #search { width: 100%; padding: 10px 40px 10px 14px; border-radius: 8px; border: 2px solid #0f3460; background: #0f3460; color: #fff; font-size: 16px; outline: none; }
  #search:focus { border-color: #e94560; }
  #search::placeholder { color: #888; }
  #clear-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #888; font-size: 18px; cursor: pointer; display: none; }
  #main { flex: 1; display: flex; overflow: hidden; }
  #results { width: 260px; flex-shrink: 0; overflow-y: auto; background: #16213e; border-right: 1px solid #0f3460; }
  #result-count { padding: 10px 14px; font-size: 12px; color: #888; border-bottom: 1px solid #0f3460; }
  .pad-item { padding: 12px 14px; border-bottom: 1px solid #0f3460; cursor: pointer; transition: background 0.15s; }
  .pad-item:hover { background: #0f3460; }
  .pad-item.active { background: #e94560; }
  .pad-name { font-size: 15px; font-weight: 700; }
  .pad-loc { font-size: 12px; color: #aaa; margin-top: 2px; }
  .pad-item.active .pad-loc { color: #fcc; }
  #map { flex: 1; }
  #popup-panel { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: #16213e; border-top: 3px solid #e94560; padding: 16px 16px 24px; z-index: 2000; }
  #popup-panel h2 { font-size: 20px; color: #e94560; margin-bottom: 4px; }
  #popup-panel p { font-size: 13px; color: #aaa; margin-bottom: 14px; }
  .btn-row { display: flex; gap: 10px; }
  .nav-btn { flex: 1; padding: 13px; border-radius: 8px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; }
  .nav-btn.google { background: #4285F4; color: white; }
  .nav-btn.apple { background: #555; color: white; }
  .close-btn { position: absolute; top: 12px; right: 16px; background: none; border: none; color: #888; font-size: 24px; cursor: pointer; line-height: 1; }
  #map-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; color: #888; font-size: 14px; pointer-events: none; }
  @media (max-width: 500px) {
    #results { width: 200px; }
    .pad-name { font-size: 14px; }
  }
</style>
</head>
<body>
<div id="header">
  <h1>🌿 Pad Finder</h1>
  <div id="search-wrap">
    <input id="search" type="text" placeholder="Search pad number or area..." autocomplete="off" autocorrect="off" spellcheck="false"/>
    <button id="clear-btn" onclick="clearSearch()">✕</button>
  </div>
</div>
<div id="main">
  <div id="results">
    <div id="result-count"></div>
    <div id="result-list"></div>
  </div>
  <div id="map">
    <div id="map-loading">Loading map...</div>
  </div>
</div>
<div id="popup-panel">
  <button class="close-btn" onclick="closePopup()">✕</button>
  <h2 id="popup-name"></h2>
  <p id="popup-info"></p>
  <div class="btn-row">
    <button class="nav-btn google" onclick="openGoogleMaps()">&#9655; Navigate (Google Maps)</button>
    <button class="nav-btn apple" onclick="openAppleMaps()">&#9655; Apple Maps</button>
  </div>
</div>

let map, markerLayer = {}, selectedPad = null;

function init() {
  document.getElementById("map-loading").style.display = "none";
  map = L.map("map").setView([-17.15, 145.35], 10);

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "© OpenStreetMap",
    maxZoom: 18
  }).addTo(map);

  PADS.forEach(function(pad) {
    var m = L.circleMarker([pad.lat, pad.lon], {
      radius: 7,
      fillColor: "#e94560",
      color: "#fff",
      weight: 1.5,
      fillOpacity: 0.9
    }).addTo(map);
    m.bindTooltip(pad.name, { permanent: false, direction: "top" });
    m.on("click", function() { selectPad(pad); });
    markerLayer[pad.name] = m;
  });

  renderList(PADS);
}

function cssId(name) { return "item_" + name.replace(/[^a-zA-Z0-9]/g, "_"); }

function renderList(pads) {
  var list = document.getElementById("result-list");
  var count = document.getElementById("result-count");
  count.textContent = pads.length === PADS.length
    ? "All " + PADS.length + " pads"
    : pads.length + " of " + PADS.length + " pads";

  list.innerHTML = pads.map(function(p) {
    return "<div class="pad-item" id="" + cssId(p.name) + "" onclick="selectPadByName('" + p.name.replace(/'/g, "\'") + "')">"+
      "<div class="pad-name">" + p.name + "</div>"+
      "<div class="pad-loc">" + (p.location || p.folder || "No location") + "</div>"+
      "</div>";
  }).join("");
}

function selectPadByName(name) {
  var pad = PADS.find(function(p) { return p.name === name; });
  if (pad) selectPad(pad);
}

function selectPad(pad) {
  if (selectedPad) {
    var oldItem = document.getElementById(cssId(selectedPad.name));
    if (oldItem) oldItem.classList.remove("active");
    var oldM = markerLayer[selectedPad.name];
    if (oldM) oldM.setStyle({ fillColor: "#e94560", radius: 7 });
  }
  selectedPad = pad;
  var item = document.getElementById(cssId(pad.name));
  if (item) { item.classList.add("active"); item.scrollIntoView({ block: "nearest" }); }
  var m = markerLayer[pad.name];
  if (m) { m.setStyle({ fillColor: "#ffcc00", radius: 11 }); }
  map.setView([pad.lat, pad.lon], 15);
  showPopup(pad);
}

function showPopup(pad) {
  document.getElementById("popup-name").textContent = "Pad " + pad.name;
  document.getElementById("popup-info").textContent =
    (pad.location ? pad.location + "  ·  " : "") +
    pad.lat.toFixed(6) + ", " + pad.lon.toFixed(6);
  document.getElementById("popup-panel").style.display = "block";
}

function closePopup() {
  document.getElementById("popup-panel").style.display = "none";
}

function openGoogleMaps() {
  if (!selectedPad) return;
  window.open(
    "https://www.google.com/maps/dir/?api=1&destination=" + selectedPad.lat + "," + selectedPad.lon + "&travelmode=driving",
    "_blank"
  );
}

function openAppleMaps() {
  if (!selectedPad) return;
  window.open(
    "https://maps.apple.com/?daddr=" + selectedPad.lat + "," + selectedPad.lon + "&dirflg=d",
    "_blank"
  );
}

function clearSearch() {
  document.getElementById("search").value = "";
  document.getElementById("clear-btn").style.display = "none";
  renderList(PADS);
}

document.getElementById("search").addEventListener("input", function() {
  var q = this.value.trim().toLowerCase();
  document.getElementById("clear-btn").style.display = q ? "block" : "none";
  if (!q) { renderList(PADS); return; }
  var filtered = PADS.filter(function(p) {
    return p.name.toLowerCase().includes(q) ||
           p.location.toLowerCase().includes(q) ||
           p.folder.toLowerCase().includes(q);
  });
  renderList(filtered);
});

// Init after DOM ready
if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", init);
} else {
  init();
}
